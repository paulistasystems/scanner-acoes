docRoot                   $VH_ROOT/html/

index  {
  useServer               0
  indexFiles              index.html
}

errorlog $VH_ROOT/logs/error.log {
  useServer               1
  logLevel                INFO
  rollingSize             10M
}

accesslog $VH_ROOT/logs/access.log {
  useServer               0
  logFormat               "%h %l %u %t \"%r\" %>s %b"
  rollingSize             10M
  keepDays                7
}

# --- Backends (rede docker compose) ---
extprocessor passenger {
  type                    proxy
  address                 passenger:3000
  maxConns                100
  pcKeepAliveTimeout      60
  initTimeout             120
  retryTimeout            0
  respBuffer              0
}

extprocessor chartphp {
  type                    proxy
  address                 php:8008
  maxConns                50
  pcKeepAliveTimeout      60
  initTimeout             60
  retryTimeout            0
  respBuffer              0
}

# Mesmo subpath de produção
context /scanner {
  type                    proxy
  handler                 passenger
  addDefaultCharset       off
}

context /scanner/ {
  type                    proxy
  handler                 passenger
  addDefaultCharset       off
}

# Egress Yahoo (em prod na raiz do domínio)
context /yahoo_chart.php {
  type                    proxy
  handler                 chartphp
  addDefaultCharset       off
}

context / {
  location                $DOC_ROOT/
  allowBrowse             1
  addDefaultCharset       off
}
