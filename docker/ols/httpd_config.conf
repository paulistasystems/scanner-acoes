#
# OpenLiteSpeed — config mínima para stack local (proxy /scanner + /yahoo_chart.php)
# Baseada no layout do container oficial litespeedtech/openlitespeed.
#
serverName                      scanner-ols
user                            nobody
group                           nogroup
priority                        0
inMemBufSize                    60M
swappingDir                     /tmp/lshttpd/swap
autoFix503                      1
gracefulRestartTimeout          300
mime                            conf/mime.properties
showVersionNumber               0
adminEmails                     root@localhost
indexFiles                      index.html, index.php
disableWebAdmin                 1

errorlog logs/error.log {
  logLevel                      INFO
  debugLevel                    0
  rollingSize                   10M
  enableStderrLog               1
}

accesslog logs/access.log {
  rollingSize                   10M
  keepDays                      7
  compressArchive               0
}

expires {
  enableExpires                 1
  expiresByType                 image/*=A604800,text/css=A604800,application/x-javascript=A604800,application/javascript=A604800
}

tuning {
  maxConnections                1000
  maxSSLConnections             1000
  connTimeout                   120
  maxKeepAliveReq               1000
  keepAliveTimeout              5
  sndBufSize                    0
  rcvBufSize                    0
  maxReqURLLen                  32768
  maxReqHeaderSize              65536
  maxReqBodySize                500M
  maxDynRespHeaderSize          32768
  maxDynRespSize                500M
  enableGzipCompress            1
  enableBrCompress              0
  compressibleTypes             default
}

listener Default {
  address                       *:80
  secure                        0
  map                           scanner *
}

vhTemplate centralConfigLog {
  templateFile                  conf/templates/ccl.conf
  listeners                     Default
}

vhTemplate EasyRailsWithSuEXEC {
  templateFile                  conf/templates/rails.conf
  listeners                     Default
}

virtualhost scanner {
  vhRoot                        /var/www/vhosts/scanner/
  configFile                    conf/vhosts/scanner/vhconf.conf
  allowSymbolLink               1
  enableScript                  1
  restrained                    0
  setUIDMode                    0
}
